services:
  - type: web
    name: outmate-ai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt && python -m backend.database
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.12"
